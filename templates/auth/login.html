<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--<link rel="stylesheet" href="static/custom.css">-->
    <link rel="stylesheet" href="{{ url_for('static', filename='custom.css') }}">
    <title>Document</title>
</head>
<body>
    <div class="form-login">
        <form action="" method="POST">
            <h1>Login</h1>
            <p>E-mail</p>
            <input type="text" name="email">
            <p>Senha</p>
            <input type="password" name="password">
            <br>
            <button type="submit" class="button-base button-login">Entrar</button>
        </form>
    </div>
    {% block content %}
        <p>Logado? {{ 'Sim' if current_user.is_authenticated else 'Não' }}</p>
        <p>User atual: {{ current_user.get_id() if current_user.is_authenticated else 'Nenhum' }}</p>
    {%endblock%}
</body>
</html>
