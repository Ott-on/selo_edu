{% block content %}
    <h2>Bem-vindo ao SELOEDU</h2>
    <p>Esta é a página inicial da aplicação.</p>
    <p><a href="{{ url_for('auth.login') }}">Entrar</a></p>
    <p>Logado? {{ 'Sim' if current_user.is_authenticated else 'Não' }}</p>

{%endblock%}
